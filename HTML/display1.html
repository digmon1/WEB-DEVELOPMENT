<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box {
            height: 100px;
            width: 100px;
            border: 1px solid black;
            background-color: red;

            opacity: 0%;
        }

        .box1 {
            height: 100px;
            width: 100px;
            border: 1px solid black;
            background-color: red;
            opacity: 15%;
        }

        .box2 {
            height: 100px;
            width: 100px;
            border: 1px solid black;
            background-color: red;
            opacity: 25%;
        }

        .box3 {
            height: 100px;
            width: 100px;
            border: 1px solid black;
            background-color: red;

            opacity: 50%;
        }
    </style>
</head>

<body>
    <h1>container class</h1>
    <div>
        <div class="box" style="border-radius: 0%;">
        </div>
        <div class="box1" style="border-radius: 15%;">
        </div>
        <div class="box2" style="border-radius: 25%;">
        </div>
        <div class="box3" style="border-radius: 50%;">
        </div>
    </div>

</body>

</html>
