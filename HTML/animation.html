<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        @keyframes myanimation {
            from {
                background-color: orange;
            }

            to {
                background-color: aqua;
            }
        }

        .box {
            width: 100px;
            height: 100px;
            background-color: orange;
            /* Syntax
            animation: animation-name duration transition-function delay iteration
            */
            animation: myanimation 2s ease-in 1s 5;
        }

        /* Animation Multiplle Steps*/
        .box2 {
            width: 100px;
            height: 100px;
            background-color: navy;
            animation: newAnimation 3s ease-in-out 0s 2;
            position: relative;
        }

        @keyframes newAnimation {
            0% {
                background-color: pink;
                left: 10px;
                top: 10px;
            }

            25% {
                background-color: violet;
                left: 200px;
                top: 10px;
            }

            50% {
                background-color: aqua;
                left: 200px;
                top: 200px;
            }

            75% {
                background-color: tomato;
                left: 10px;
                top: 200px;
            }

            100% {
                background-color: lightgreen;
                left: 10px;
                top: 10px;
            }
        }

        /**/
    </style>
</head>

<body>
    <h1>Animation Style</h1>
    <h3>Animation with keyframes - start and end</h3>

    <div class="box">
    </div>
    <h3>Animation with keyframes Multiple steps</h3>
    <div class="box2">

    </div>
</body>

</html>
