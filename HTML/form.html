<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <!--from -Uppercase - rgistration collect user input, login, online shopping,
        input- collects input from user
            id- ubique indentifier, name-name of input feild
            placeholder- suggestion text..
            text- for text input [short like username, contact]password- for password input..
            date- provides date-month-year..
            datetime-local - provides date and time..
            number- for nmber input..
            week - provide week and year..
            month- provide month and year..
            color- provides color picker..
        label- provides label for input field
            for- [should be same as id of input field] - connect label to input field.
        textarea- for large input like bio, comment, feedback
        button- for submit, reset, cancel..
    
        -->
    <h1>Form in HTML</h1>
    <form action="" method="">
        <label for="uname">Username</label>
        <br>
        <input type="text" name="Username" id="uname" placeholder="Enter your Name" required>
        <br>
        <br>
        <label for="pw">Password</label>
        <br>
        <input type="password" name="password" id="pw" placeholder="Enter your Password" required>
        <br> <br>
        <label for="bio">Bio</label>
        <br>
        <textarea role="10" cols="50" id="bio"></textarea>
        <br> <br>
        <label for="'email">Email</label>
        <br>
        <input type="email" name="email" id="email" placeholder="Enter email" required>
        <br> <br>
        <label for="age">Age</label>
        <br>
        <input type="age" name="age" id="age" placeholder="17" required>
        <br> <br>
        <label for="DOB">DOB</label>
        <br>
        <input type="datetime-local" name="DOB" id="DOB">
        <br> <br>
        <label for="month">Month</label>
        <br>
        <input type="month" name="month">
        <br> <br>
        <label for="week">Week</label>
        <br>
        <input type="week" name="week">
        <br> <br>
        <label for="color">color</label>
        <br>
        <input type="color" name="colr" id="color">
        <br> <br>
        <button type="submit">Submit</button>
    </form>
</body>

</html>
